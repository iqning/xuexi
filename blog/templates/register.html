{% extends 'auth_base.html' %}

<!--
    注册页面模板
    布局：表单居中，毛玻璃效果与花海背景融合
-->

{% block title %}注册 - {{ site_name }}{% endblock %}

<!-- 注册页专属：毛玻璃表单，融入花海背景 -->
{% block head %}
<style>
    /* ── 表单卡片：完全透明，无任何样式，融入图片 ── */
    .auth-centered .auth-form-wrapper {
        background: transparent;
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        border: none;
        border-radius: 0;
        box-shadow: none;
    }

    /* ── 标题：白色 + 投影 ── */
    .auth-centered .auth-form-wrapper h2 {
        color: #fff;
        text-shadow: 0 2px 12px rgba(0, 40, 80, 0.40);
    }

    /* ── 标签：白色 ── */
    .auth-centered .form-group label {
        color: #fff;
        text-shadow: 0 1px 6px rgba(0, 30, 60, 0.35);
    }

    /* ── 输入框：实白底，清晰可见 ── */
    .auth-centered .form-group input[type="text"],
    .auth-centered .form-group input[type="password"] {
        background: rgba(255, 255, 255, 0.55) !important;
        border: 1px solid rgba(255, 255, 255, 0.50) !important;
        color: #1a3a5c;
        transition: all 0.25s;
    }
    .auth-centered .form-group input::placeholder {
        color: rgba(80, 110, 140, 0.60);
    }
    .auth-centered .form-group input[type="text"]:focus,
    .auth-centered .form-group input[type="password"]:focus {
        background: rgba(255, 255, 255, 0.75) !important;
        border-color: rgba(255, 255, 255, 0.70) !important;
        box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.25) !important;
        outline: none;
    }

    /* ── 按钮：半透白底，融入图片 ── */
    .auth-centered .btn-primary {
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.50);
        color: #3898d0;
        font-weight: 600;
        letter-spacing: 1px;
        transition: all 0.25s;
    }
    .auth-centered .btn-primary:hover {
        background: #fff;
        color: #2890d0;
        border-color: #5aacdf;
        box-shadow: 0 4px 16px rgba(0, 80, 160, 0.15);
    }

    /* ── 跳转链接：白色 + 下划线 ── */
    .auth-centered .auth-switch {
        color: rgba(255, 255, 255, 0.80);
        text-shadow: 0 1px 4px rgba(0, 30, 60, 0.20);
    }
    .auth-centered .auth-switch a {
        color: #fff;
        font-weight: 600;
        text-decoration: underline;
        text-underline-offset: 3px;
    }
    .auth-centered .auth-switch a:hover {
        color: rgba(255, 255, 255, 0.85);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-centered" style="background: url('{{ url_for('static', filename='picture/huahai.jpg') }}') center/cover;">
    <div class="auth-form-wrapper">
        <h2>注册新账号</h2>

        <!--
            注册表单
            method="POST"：注册信息通过请求体传输
            action 为空：提交到当前 URL，即 /register
        -->
        <form method="POST" action="" class="auth-form">
            <!-- 用户名 -->
            <div class="form-group">
                <label for="username">用户名 *</label>
                <input type="text" id="username" name="username" required
                       minlength="2" maxlength="50"
                       autocomplete="username" autofocus
                       placeholder="请输入用户名（2-50个字符）">
            </div>

            <!-- 昵称 -->
            <div class="form-group">
                <label for="nickname">昵称</label>
                <input type="text" id="nickname" name="nickname"
                       maxlength="50"
                       placeholder="取个好听的名字吧（选填）">
            </div>

            <!-- 密码 -->
            <div class="form-group">
                <label for="password">密码 *</label>
                <input type="password" id="password" name="password" required
                       minlength="6"
                       autocomplete="new-password"
                       placeholder="请输入密码（至少6位）">
            </div>

            <!-- 确认密码 -->
            <div class="form-group">
                <label for="password_confirm">确认密码 *</label>
                <input type="password" id="password_confirm" name="password_confirm" required
                       minlength="6"
                       autocomplete="new-password"
                       placeholder="请再次输入密码">
            </div>

            <!-- 提交按钮 -->
            <button type="submit" class="btn btn-primary btn-block">注册</button>
        </form>

        <!-- 跳转到登录页的引导链接 -->
        <p class="auth-switch">
            已有账号？<a href="{{ url_for('login') }}">立即登录</a>
        </p>
    </div>
</div>
{% endblock %}
