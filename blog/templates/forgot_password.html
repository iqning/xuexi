{% extends 'auth_base.html' %}

<!-- 忘记密码页面：输入用户名申请重置 -->
{% block title %}忘记密码 - {{ site_name }}{% endblock %}

{% block head %}
<style>
    .auth-form-side {
        background: linear-gradient(180deg, #ecf4fa 0%, #f6f9fc 40%, #fefefe 100%);
    }
    .auth-form-wrapper {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(40, 120, 180, 0.10),
                    0 2px 8px rgba(40, 100, 160, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.40);
    }
    .auth-form-wrapper h2 {
        position: relative;
        padding-bottom: 16px;
    }
    .auth-form-wrapper h2::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, #2890d0, #5aacdf);
    }
    .auth-form-wrapper .btn-primary {
        background: linear-gradient(135deg, #3898d0 0%, #2890d0 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        letter-spacing: 1px;
        box-shadow: 0 4px 14px rgba(40, 144, 208, 0.30);
        transition: all 0.25s;
    }
    .auth-form-wrapper .btn-primary:hover {
        background: linear-gradient(135deg, #2890d0 0%, #1a78b8 100%);
        box-shadow: 0 6px 20px rgba(40, 144, 208, 0.40);
        transform: translateY(-1px);
    }
    .auth-form-wrapper .auth-switch a {
        color: #3898d0;
        font-weight: 500;
    }
    .auth-form-wrapper .auth-switch a:hover {
        color: #1a78b8;
    }
    .auth-form-wrapper .form-group input:focus {
        border-color: #5aacdf;
        box-shadow: 0 0 0 3px rgba(40, 144, 208, 0.10);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-split">
    <!-- 左侧：花海图片展示区 -->
    <div class="auth-media-side" style="background: url('{{ url_for('static', filename='picture/huahai.jpg') }}') center/cover;">
        <div class="auth-media-content">
            <h1 class="auth-media-title">找回密码</h1>
            <p class="auth-media-subtitle">别担心，重置很简单</p>
        </div>
    </div>

    <!-- 右侧：表单 -->
    <div class="auth-form-side">
        <div class="auth-form-wrapper">
            <h2>忘记密码</h2>
            <p style="text-align:center; color:#666; margin-bottom:20px; font-size:0.9rem;">
                输入你的用户名，系统会生成重置链接
            </p>

            <!-- 提交后，重置链接会打印到 Flask 控制台 -->
            <form method="POST" action="" class="auth-form">
                <!-- CSRF 保护 -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required
                           autocomplete="username" autofocus
                           placeholder="请输入你的用户名">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    发送重置链接
                </button>
            </form>

            <p class="auth-switch">
                <a href="{{ url_for('login') }}">← 返回登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
