{% extends 'auth_base.html' %}

<!-- 重置密码页面：通过令牌访问，输入新密码 -->
{% block title %}重置密码 - {{ site_name }}{% endblock %}

{% block head %}
<style>
    .auth-form-side {
        background: linear-gradient(180deg, #ecf4fa 0%, #f6f9fc 40%, #fefefe 100%);
    }
    .auth-form-wrapper {
        background: rgba(255, 255, 255, 0.55);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        box-shadow: 0 8px 32px rgba(40, 120, 180, 0.10),
                    0 2px 8px rgba(40, 100, 160, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.40);
    }
    .auth-form-wrapper h2 {
        position: relative;
        padding-bottom: 16px;
    }
    .auth-form-wrapper h2::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 48px;
        height: 3px;
        border-radius: 2px;
        background: linear-gradient(90deg, #2890d0, #5aacdf);
    }
    .auth-form-wrapper .btn-primary {
        background: linear-gradient(135deg, #3898d0 0%, #2890d0 100%);
        border: none;
        color: #fff;
        font-weight: 600;
        letter-spacing: 1px;
        box-shadow: 0 4px 14px rgba(40, 144, 208, 0.30);
        transition: all 0.25s;
    }
    .auth-form-wrapper .btn-primary:hover {
        background: linear-gradient(135deg, #2890d0 0%, #1a78b8 100%);
        box-shadow: 0 6px 20px rgba(40, 144, 208, 0.40);
        transform: translateY(-1px);
    }
    .auth-form-wrapper .auth-switch a {
        color: #3898d0;
        font-weight: 500;
    }
    .auth-form-wrapper .auth-switch a:hover {
        color: #1a78b8;
    }
    .auth-form-wrapper .form-group input:focus {
        border-color: #5aacdf;
        box-shadow: 0 0 0 3px rgba(40, 144, 208, 0.10);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-split">
    <!-- 左侧：花海图片展示区 -->
    <div class="auth-media-side" style="background: url('{{ url_for('static', filename='picture/huahai.jpg') }}') center/cover;">
        <div class="auth-media-content">
            <h1 class="auth-media-title">设置新密码</h1>
            <p class="auth-media-subtitle">请牢记你的新密码</p>
        </div>
    </div>

    <!-- 右侧：设置新密码表单 -->
    <div class="auth-form-side">
        <div class="auth-form-wrapper">
            <h2>重置密码</h2>

            <form method="POST" action="" class="auth-form">
                <!-- CSRF 保护 -->
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <!-- 新密码 -->
                <div class="form-group">
                    <label for="new_password">新密码</label>
                    <input type="password" id="new_password" name="new_password" required
                           minlength="6"
                           autocomplete="new-password" autofocus
                           placeholder="请输入新密码（至少 6 位）">
                </div>

                <!-- 确认新密码 -->
                <div class="form-group">
                    <label for="confirm_password">确认新密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" required
                           minlength="6"
                           autocomplete="new-password"
                           placeholder="请再次输入新密码">
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    重置密码
                </button>
            </form>

            <p class="auth-switch">
                <a href="{{ url_for('login') }}">← 返回登录</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
